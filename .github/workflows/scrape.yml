name: hourly-scrape
on:
  schedule:
    - cron: '7 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.SCRAPER_PAT }}
          fetch-depth: 1

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: scrape
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: pnpm --filter @sec/scraper start

      - name: commit data
        run: |
          git config user.name  "scraper-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          NEW=$(jq '.stats.newCount // 0' data/last-run.json)
          UPD=$(jq '.stats.updatedCount // 0' data/last-run.json)
          git commit -m "[bot] scrape: +${NEW} new, ${UPD} updated [skip ci]"
          git push

      - name: upload run log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-log
          path: data/last-run.json
          retention-days: 7
